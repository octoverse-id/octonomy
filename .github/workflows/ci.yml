name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Ruff check
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format --check .

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: octonomy
          POSTGRES_PASSWORD: octonomy
          POSTGRES_DB: octonomy
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U octonomy"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://octonomy:octonomy@localhost:5432/octonomy
      SERVICE_TOKEN_PEPPER: ci-pepper
      DJANGO_DEBUG: "true"
    steps:
      - uses: actions/checkout@v4
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Run tests
        run: uv run pytest
      - name: Build OpenAPI schema
        run: uv run python manage.py spectacular --file /tmp/openapi.yaml --format openapi
