name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Ruff check
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format --check .

  checks:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: sqlite:////tmp/octonomy-check.sqlite3
      SERVICE_TOKEN_PEPPER: ci-pepper
      DJANGO_DEBUG: "true"
    steps:
      - uses: actions/checkout@v7
      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Django system checks
        run: uv run python manage.py check
      - name: Migration drift check
        run: uv run python manage.py makemigrations --check --dry-run
      - name: OpenAPI contract drift check
        run: |
          uv run python manage.py spectacular --api-version v1 --file docs/openapi.yaml --format openapi
          uv run python manage.py spectacular --api-version v2 --file docs/openapi-v2.yaml --format openapi
          git diff --exit-code docs/openapi.yaml docs/openapi-v2.yaml

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Dependency audit
        run: uv export --format requirements-txt --no-emit-project --frozen | uv run pip-audit --no-deps -r /dev/stdin

  test-sqlite:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: sqlite:////tmp/octonomy-ci.sqlite3
      SERVICE_TOKEN_PEPPER: ci-pepper
      DJANGO_DEBUG: "true"
    steps:
      - uses: actions/checkout@v7
      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Run SQLite tests
        run: uv run pytest --cov-fail-under=90

  test-postgres:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: octonomy
          POSTGRES_PASSWORD: octonomy
          POSTGRES_DB: octonomy
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U octonomy"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://octonomy:octonomy@localhost:5432/octonomy
      SERVICE_TOKEN_PEPPER: ci-pepper
      DJANGO_DEBUG: "true"
    steps:
      - uses: actions/checkout@v7
      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Run PostgreSQL tests
        run: uv run pytest --cov-fail-under=90
