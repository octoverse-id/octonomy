name: Feature request
description: Suggest an enhancement or new capability
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do? What's missing or painful today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the API, behavior, or change you'd like to see.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches or workarounds you've thought about.
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Tenancy/application scope, data volume, or related issues.
    validations:
      required: false
