name: Bug report
description: Report a problem with Octonomy
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please do **not** report security
        vulnerabilities here — see our [security policy](../../security/policy).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Include the API request (method, path, headers minus secrets) where relevant.
      placeholder: |
        1. POST /api/v1/tags with ...
        2. ...
        3. See error
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error response
      description: Paste the JSON error response or logs. Redact tokens and tenant data.
      render: text
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Release tag or commit SHA you're running.
    validations:
      required: false
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Python version, OS, Postgres version, deployment method.
    validations:
      required: false
